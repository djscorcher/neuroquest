name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 */3 * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase profiles
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://daynsxpdixvfkdnbumwi.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}")
          echo "Supabase ping status: $STATUS"
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]
